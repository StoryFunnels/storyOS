# StoryOS self-host: `docker compose up -d` → app at http://localhost (port 80)
# Every long-lived service is `restart: unless-stopped` (MN-127): a crash, an OOM
# or a host reboot must not need a human. `unless-stopped`, not `always`, so a
# deliberate `docker compose stop` stays stopped.
# caddy serves web + API on ONE origin; /api/* routes to the api container.
# Full env matrix: docs/self-hosting.md
# S3-compatible attachment storage: `docker compose --profile minio up -d`
name: storyos

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: storyos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storyos}
      POSTGRES_DB: storyos
    volumes:
      - storyos_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyos"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: storyos-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://storyos:${POSTGRES_PASSWORD:-storyos}@postgres:5432/storyos
      RUN_MIGRATIONS: "true"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env (e.g. openssl rand -hex 32)}
      CONNECTIONS_MASTER_KEY: ${CONNECTIONS_MASTER_KEY:?set CONNECTIONS_MASTER_KEY in .env (e.g. openssl rand -hex 32)}
      API_URL: ${API_URL:-http://localhost:3001}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      ATTACHMENTS_DIR: /data/attachments
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-storyos-attachments}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-storyos}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-storyos-minio}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-StoryOS <noreply@localhost>}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Billing (MN-165). All optional — unset = billing disabled, every workspace Free.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_BUSINESS: ${STRIPE_PRICE_BUSINESS:-}
      STRIPE_PRICE_SEAT: ${STRIPE_PRICE_SEAT:-}
      STRIPE_TAX_ENABLED: ${STRIPE_TAX_ENABLED:-false}
      # OAuth for hosted-MCP connectors (MN-154). Off unless set true; needs oidc tables migrated.
      MCP_OAUTH: ${MCP_OAUTH:-}
      # GitHub App (#247). All optional — absent means the Connect flow is simply
      # unavailable and the app boots fine. Prefer the inline PEM (\n-escaped) in
      # GITHUB_APP_PRIVATE_KEY; the container can't read a host file path unless you
      # also mount it, so GITHUB_APP_PRIVATE_KEY_FILE must point at a path INSIDE the
      # container (see the commented volume below).
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:-}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_PRIVATE_KEY_FILE: ${GITHUB_APP_PRIVATE_KEY_FILE:-}
      # The App's ONE webhook secret (whsec_…), set once at App registration.
      # When set, inbound deliveries verify against it and resolve the workspace by
      # the payload's installation.id — no per-workspace secret. Absent → the
      # legacy per-workspace webhook_secret path stays in effect.
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET:-}
    volumes:
      - storyos_attachments:/data/attachments
      # To use GITHUB_APP_PRIVATE_KEY_FILE instead of the inline key, mount the PEM
      # read-only and set GITHUB_APP_PRIVATE_KEY_FILE=/run/secrets/github-app.pem :
      # - ./github-app.pem:/run/secrets/github-app.pem:ro

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        # Empty = same-origin: the web bundle calls /api/v1/* relative to the page,
        # and caddy routes it. Set an absolute URL only for split-origin setups.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        # PostHog analytics. NEXT_PUBLIC_* are baked into the client bundle at
        # BUILD time, so they must be passed as build args. No default token —
        # analytics is opt-in. Set your own PostHog project token in .env to
        # enable it; leave it unset to disable analytics entirely.
        NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
    image: storyos-web:latest
    restart: unless-stopped
    environment:
      # Also exposed at runtime for server-side capture (posthog-node).
      NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
    depends_on:
      - api

  # Hosted MCP endpoint (Streamable HTTP). Route a subdomain to it in your Caddy
  # TLS drop-in, e.g. mcp.your-domain.com → mcp:3002. Auth is per-request: each
  # client sends its own StoryOS PAT in the Authorization header.
  mcp:
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
    image: storyos-mcp:latest
    restart: unless-stopped
    depends_on:
      - api
    environment:
      STORYOS_URL: ${MCP_STORYOS_URL:-http://api:3001}
      # Public web origin, for the `url` field on record responses (#268) — same
      # var the web/api services use, so a self-host deploy only sets it once.
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      PORT: "3002"
      # OAuth discovery advertising (MN-154). Set true once the AS (api) has MCP_OAUTH on.
      MCP_OAUTH: ${MCP_OAUTH:-}
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-https://mcp.storyos.dev}
      MCP_AUTH_SERVER: ${MCP_AUTH_SERVER:-https://app.storyos.dev}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    healthcheck:
      # A crashed proxy is caught by `restart`; a HUNG one is only caught here.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - web
      - api
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/tls.d:/etc/caddy/tls.d:ro
      - ./docker/certs:/etc/caddy/certs:ro
      - storyos_caddy:/data
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"

  minio:
    image: minio/minio:latest
    profiles: [minio]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-storyos}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-storyos-minio}
    volumes:
      - storyos_minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  storyos_pg:
  storyos_attachments:
  storyos_minio:
  storyos_caddy:
